name: Tests

on:
  push:
    branches:
      - main
      - '*.*.*'

  pull_request:
    branches:
      - main
      - '*.*.*'

  release:
    types: [ published ]

jobs:

  autoflake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install packages
        run: poetry install --with=dev --no-root

      - name: Autoflake
        run: |
          poetry run autoflake kasm/ -r --check-diff

  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install packages
        run: poetry install --with=dev --no-root

      - name: Black
        run: |
          poetry run black --check -l 120 kasm/

  isort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install packages
        run: poetry install --with=dev --no-root

      - name: Isort
        run: |
          poetry run isort --check kasm/

  pycodestyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install packages
        run: poetry install --with=dev --no-root

      - name: Pycodestyle
        run: |
          poetry run pycodestyle kasm/

  pydocstyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install packages
        run: poetry install --with=dev --no-root

      - name: Pydocstyle
        run: |
          poetry run pydocstyle --count kasm/

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install packages
        run: poetry install --with=dev --no-root

      - name: Mypy
        run: |
          poetry run mypy kasm --disallow-untyped-def

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install packages
        run: poetry install --with=dev --no-root

      - name: Bandit
        run: |
          poetry run bandit --ini=setup.cfg -ll 2> /dev/null

